<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Практика по формам</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="form-group">
				<h1>Ваши личные данные</h1>
				<label class="label">
					Ваше имя
					<input type="text" required placeholder="Имя" name="name" />
				</label>
				<label class="label">
					Ваш возраст
					<input
						type="number"
						inputmode="numeric"
						placeholder="Возраст"
						required
						name="age"
					/>
				</label>
				<label class="label">
					Ваш номер телефона
					<input
						type="tel"
						inputmode="tel"
						required
						name="tel"
						placeholder="Номер телефона"
					/>
				</label>
				<label class="label">
					Ваша почта
					<input
						type="email"
						inputmode="email"
						required
						placeholder="Почта"
						name="email"
					/>
				</label>
			</fieldset>
			<fieldset class="form-group">
				<label class="label">Сообщение</label>
				<textarea name="massadg" required id=""></textarea>
				<label class="label">
					<input class="button" type="checkbox" required />
					<span>Я принимаю правила</span>
				</label>
			</fieldset>
			<button class="button">Отправить</button>
		</form>
	</body>
</html>
